<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>QQ Avatar 聊天气泡交互原型</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --font:'PingFang SC','SF Pro Display','Helvetica Neue',sans-serif;
  --bg:#F2F2F2;
  --white:#FFFFFF;
  --black:#000000;
  --gray-100:#FAFAFA;
  --gray-200:#F0F0F0;
  --gray-300:#E5E5E5;
  --gray-400:#CCCCCC;
  --gray-500:#999999;
  --gray-600:#666666;
  --gray-700:#333333;
  --gray-800:#1A1A1A;
  --text-primary:rgba(0,0,0,.88);
  --text-secondary:rgba(0,0,0,.40);
  --text-tertiary:rgba(0,0,0,.25);
  --border:rgba(0,0,0,.06);
  --shadow-sm:0 1px 3px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.06);
  --shadow-lg:0 8px 30px rgba(0,0,0,.08);

  /* ====== 动效参数（可调节） ====== */
  /* 消息行：整行滑入 */
  --row-slide-y: 8px;                /* 消息行初始下移距离 */
  --row-duration: 0.25s;             /* 消息行动画时长 */
  --row-easing: cubic-bezier(.4,0,.2,1); /* 消息行缓动曲线 */

  /* Avatar 角色 */
  --avatar-slide-y: 16px;            /* avatar 初始下移距离 */
  --avatar-show-y: -15px;              /* avatar 最终 Y 偏移 */
  --avatar-duration: 0.3s;           /* avatar 动画时长 */
  --avatar-easing: cubic-bezier(.34,1.56,.64,1); /* avatar 缓动曲线 */

  /* 气泡弹出（有 Avatar） */
  --bubble-scale-from: 0.7;          /* 气泡初始缩放 */
  --bubble-scale-bounce: 1.02;       /* 气泡弹性最大缩放 */
  --bubble-duration: 0.4s;          /* 气泡动画时长 */
  --bubble-easing: cubic-bezier(.2,.8,.4,1); /* 气泡缓动曲线 */

  /* 气泡弹出（无 Avatar / 蛋黄） */
  --bubble-fade-duration: 0.25s;     /* 淡入时长 */

  /* 愤怒气泡抖动 */
  --shake-duration: 0.4s;            /* 抖动时长 */
  --shake-distance: 3px;             /* 抖动距离 */
}
html{font-size:16px;height:100%}
html,body{overscroll-behavior:none}
body{
  font-family:var(--font);
  background:var(--gray-200);
  display:flex;flex-direction:column;align-items:center;
  min-height:100vh;padding:24px 16px 48px;
  color:var(--text-primary);overflow-x:hidden;
}
/* 手机端全屏：去掉 phone-frame 外壳，直接铺满 */
@media (max-width:500px){
  body{padding:0;background:var(--white)}
  .phone-frame{
    width:100%!important;height:100vh!important;height:100dvh!important;
    border-radius:0!important;box-shadow:none!important;
  }
  .hint,.btn-clear{display:none!important}
  .home-indicator{padding-bottom:env(safe-area-inset-bottom)}
}

/* ============ CONTROL BAR ============ */
.control-bar{
  position:sticky;top:12px;z-index:100;
  display:flex;align-items:center;gap:12px;
  padding:10px 20px;margin-bottom:20px;
  background:rgba(255,255,255,.72);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-radius:14px;border:1px solid var(--border);
  box-shadow:var(--shadow-md);
}
.control-bar .label{font-size:12px;color:var(--text-secondary);font-weight:500;letter-spacing:.3px}
.style-toggle{display:flex;background:var(--gray-200);border-radius:8px;padding:2px}
.style-toggle button{
  padding:6px 14px;border:none;cursor:pointer;
  font-size:11px;font-weight:600;font-family:var(--font);
  color:var(--text-secondary);background:transparent;
  border-radius:6px;transition:all .25s;
}
.style-toggle button.active{
  background:var(--white);color:var(--gray-800);
  box-shadow:0 1px 4px rgba(0,0,0,.08);
}
.btn-clear{
  display:flex;align-items:center;gap:5px;
  padding:6px 14px;border:none;border-radius:8px;cursor:pointer;
  background:var(--gray-800);
  color:var(--white);font-size:11px;font-weight:600;font-family:var(--font);
  transition:all .2s;
}
.btn-clear:hover{background:var(--black)}
.btn-clear:active{transform:scale(.96)}
.btn-clear svg{width:12px;height:12px}

/* ============ PHONE FRAME ============ */
.phone-frame{
  width:428px;height:926px;
  background:var(--white);border-radius:44px;
  box-shadow:
    0 0 0 1px rgba(0,0,0,.08),
    0 20px 60px rgba(0,0,0,.10),
    0 40px 80px rgba(0,0,0,.05);
  overflow:hidden;display:flex;flex-direction:column;position:relative;
}

/* ============ STATUS BAR ============ */
.status-bar{
  height:44px;display:flex;align-items:flex-end;justify-content:space-between;
  padding:0 28px 0;flex-shrink:0;position:relative;z-index:40;
  background:var(--white);
}
.status-bar .time{
  font-size:17px;font-weight:600;font-family:'SF Pro',var(--font);
  color:var(--black);padding-bottom:8px;
}
.status-bar .icons{display:flex;gap:6px;align-items:center;padding-bottom:10px}
.status-bar .icons img{height:12px}

/* ============ CHAT HEADER ============ */
.chat-header{
  height:34px;display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;border-bottom:.5px solid var(--border);flex-shrink:0;
  background:var(--white);
}
.chat-header .left{display:flex;align-items:center;gap:6px}
.chat-header .left .back-btn{display:flex;align-items:center;cursor:pointer}
.chat-header .left .back-btn img{width:12px;height:24px}
.chat-header .left .badge{
  font-size:14px;font-weight:500;font-family:'SF Pro Display',var(--font);
  background:var(--gray-200);border-radius:12px;
  padding:4px 6px;color:var(--text-primary);min-width:29px;text-align:center;line-height:1;
}
.chat-header .title{font-size:17px;font-weight:500;color:var(--text-primary)}
.chat-header .right img{width:24px;height:24px}

/* ============ MESSAGE LIST ============ */
.msg-list{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:18px 4px 18px;background:var(--white);
  display:flex;flex-direction:column;gap:0;
  scroll-behavior:smooth;
}
.msg-list::-webkit-scrollbar{width:0}

/* Empty state */
.empty-state{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:12px;padding:60px 40px;
  text-align:center;
}
.empty-state .empty-icon{
  width:80px;height:80px;border-radius:40px;
  background:var(--gray-200);
  display:flex;align-items:center;justify-content:center;
  box-shadow:inset 0 2px 6px rgba(0,0,0,.04);
}
.empty-state .empty-icon svg{width:32px;height:32px;color:var(--gray-400)}
.empty-state .empty-title{font-size:15px;font-weight:600;color:var(--gray-700)}
.empty-state .empty-desc{font-size:12px;color:var(--text-secondary);line-height:1.6}

/* Time label */
.time-label{
  text-align:center;padding:10px 0 6px;
  font-size:11px;color:var(--text-tertiary);font-weight:400;
  letter-spacing:.3px;
}

/* ============ MESSAGE ROW ============ */
.msg-row{
  display:flex;align-items:flex-start;gap:0;
  min-height:90px;
  flex-shrink:0;
  opacity:0;transform:translateY(var(--row-slide-y));
  transition:opacity var(--row-duration) ease,transform var(--row-duration) var(--row-easing);
  margin:0;position:relative;
}
.msg-row.show{opacity:1;transform:translateY(0)}
.msg-row.right{flex-direction:row-reverse}

/* ============ AVATAR CHARACTER ============ */
.avatar-character{
  width:60px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;
  justify-content:flex-end;position:relative;
  opacity:0;transform:translateY(var(--avatar-slide-y)) scale(.9);
  transition:opacity var(--avatar-duration) ease,transform var(--avatar-duration) var(--avatar-easing);
}
.avatar-character.show{opacity:1;transform:translateY(var(--avatar-show-y)) scale(1)}
.avatar-character img{
  width:90px;height:90px;object-fit:contain;
}
/* speaking 状态不再摇晃，保持静止 */
.avatar-character.speaking img{}

/* Video avatar */
.avatar-character video{
  width:82px;height:90px;object-fit:cover;
  background:var(--white);
  border-radius:0;
}
/* 白底视频混合模式 */
.avatar-character video.blend-white{
  mix-blend-mode:multiply;
}
@keyframes speak-sway{
  0%,100%{transform:rotate(0deg) translateY(0)}
  15%{transform:rotate(-1.5deg) translateY(-1.5px)}
  50%{transform:rotate(0deg) translateY(-1px)}
  85%{transform:rotate(1.5deg) translateY(-1.5px)}
}

/* ============ NORMAL AVATAR ============ */
.normal-avatar{
  width:60px;flex-shrink:0;
  display:flex;align-items:flex-start;justify-content:center;
  padding-top:18px;
  margin-left:0;margin-right:0;
  min-height:90px;
}
.normal-avatar img{width:40px;height:40px;border-radius:20px;object-fit:cover;box-shadow:0 1px 3px rgba(0,0,0,.06)}

/* ============ BUBBLE WRAP ============ */
.bubble-wrap{display:flex;flex-direction:column;max-width:260px;position:relative}
.msg-row.right .bubble-wrap{align-items:flex-end}
.msg-row.left .bubble-wrap{align-items:flex-start;margin-left:0}
.msg-row.left .bubble-wrap.no-avatar{margin-left:0}
.sender-name{
  font-size:11px;color:var(--text-secondary);margin-bottom:5px;
  padding:0 6px;font-weight:500;
}

/* ============ BUBBLE BASE ============ */
.bubble{
  position:relative;padding:9px 14px;
  font-size:17px;line-height:1.4;letter-spacing:.1px;
  min-height:42px;
  word-break:break-all;
}
/* Avatar user bubble: 从尖角位置弹出 */
.msg-row.left .has-avatar .bubble{
  opacity:0;
  transform:scale(0);
  transform-origin:left top;
}
.msg-row.right .has-avatar .bubble{
  opacity:0;
  transform:scale(0);
  transform-origin:right top;
}
.msg-row.left .has-avatar .bubble.show{
  opacity:1;transform:scale(1);
  animation:bubble-pop-left var(--bubble-duration) var(--bubble-easing) both;
}
.msg-row.right .has-avatar .bubble.show{
  opacity:1;transform:scale(1);
  animation:bubble-pop-right var(--bubble-duration) var(--bubble-easing) both;
}
@keyframes bubble-pop-left{
  0%{opacity:0;transform:scale(var(--bubble-scale-from)) translateX(clamp(-36px, -10vw, -24px)) translateY(clamp(-18px, -5vw, -10px))}
  25%{opacity:1;transform:scale(var(--bubble-scale-from)) translateX(clamp(-36px, -10vw, -24px)) translateY(clamp(-18px, -5vw, -10px))}
  70%{opacity:1;transform:scale(var(--bubble-scale-bounce)) translateX(0)}
  100%{opacity:1;transform:scale(1) translateX(0)}
}
@keyframes bubble-pop-right{
  0%{opacity:0;transform:scale(var(--bubble-scale-from)) translateX(clamp(24px, 10vw, 36px)) translateY(clamp(-18px, -5vw, -10px))}
  25%{opacity:1;transform:scale(var(--bubble-scale-from)) translateX(clamp(24px, 10vw, 36px)) translateY(clamp(-18px, -5vw, -10px))}
  70%{opacity:1;transform:scale(var(--bubble-scale-bounce)) translateX(0)}
  100%{opacity:1;transform:scale(1) translateX(0)}
}
/* No-avatar user bubble: simple fade only */
.no-avatar .bubble{
  opacity:0;
  transition:opacity var(--bubble-fade-duration) ease;
}
.no-avatar .bubble.show{
  opacity:1;
}

/* ============ COMIC STYLE (漫画风) - 基础 ============ */
[data-style="comic"] .bubble{
  background:transparent;
  border:none;
  border-radius:0;
  box-shadow:none;
  color:var(--text-primary);font-size:17px;
  border-image-repeat:stretch;
  border-style:solid;
  border-width:0;
  display:flex;align-items:center;
  padding:8px 14px;
  min-height:42px;
}
[data-style="comic"] .msg-row.left .has-avatar .bubble::before,
[data-style="comic"] .msg-row.left .has-avatar .bubble::after,
[data-style="comic"] .msg-row.right .has-avatar .bubble::before,
[data-style="comic"] .msg-row.right .has-avatar .bubble::after{
  display:none;
}
/* 蛋黄/普通头像 */
[data-style="comic"] .msg-row.left .no-avatar .bubble{
  background:var(--gray-200);border:none;border-radius:14px;box-shadow:none;
  border-image:none;padding:9px 14px;display:block;
}

/* ============ 气泡 A（普通气泡：纯矩形圆角） ============ */
[data-bubble="A"] .msg-row.left .has-avatar .bubble,
[data-bubble="A"] .msg-row.left .no-avatar .bubble{
  background:var(--gray-200);
  border:none;border-radius:12px;
  border-image:none;border-width:0;
  padding:9px 14px;
  color:var(--text-primary);
  display:block;min-height:42px;
  box-shadow:none;
  margin-left:8px;
}
[data-bubble="A"] .msg-row.right .has-avatar .bubble,
[data-bubble="A"] .msg-row.right .no-avatar .bubble{
  background:#0099ff;
  border:none;border-radius:12px;
  border-image:none;border-width:0;
  padding:9px 14px;
  color:#fff;
  display:block;min-height:42px;
  box-shadow:none;
  margin-right:8px;
}
/* 昵称对齐 */
[data-bubble="A"] .msg-row.left .sender-name{text-align:left}
[data-bubble="A"] .msg-row.right .sender-name{text-align:right}

/* ============ 气泡 B（漫画方形） ============ */
[data-bubble="B"] .msg-row.left .has-avatar .bubble{
  margin-left:-10px;
  border-image-source:url('bubbleB-left.png');
  border-image-slice:75 84 36 120 fill;
  border-image-width:25px 28px 12px 40px;
  padding:8px 22px 8px 30px;
}
[data-bubble="B"] .msg-row.right .has-avatar .bubble{
  margin-right:-10px;
  border-image-source:url('bubbleB-right.png');
  border-image-slice:75 120 36 84 fill;
  border-image-width:25px 40px 12px 28px;
  padding:8px 30px 8px 22px;
}

/* ============ 气泡 C（圆角双描边） ============ */
[data-bubble="C"] .msg-row.left .has-avatar .bubble{
  margin-left:-6px;
  border-image-source:url('bubbleC-left.png');
  border-image-slice:63 66 66 84 fill;
  border-image-width:21px 22px 22px 28px;
  padding:8px 14px 8px 19px;
}
[data-bubble="C"] .msg-row.right .has-avatar .bubble{
  margin-right:-6px;
  border-image-source:url('bubbleC-right.png');
  border-image-slice:63 84 66 66 fill;
  border-image-width:21px 28px 22px 22px;
  padding:8px 19px 8px 14px;
}

/* ============ 气泡 D（泡泡气泡） ============ */
[data-bubble="D"] .msg-row.left .has-avatar .bubble{
  margin-left:-15px;
  margin-top:-2px;
  border-image-source:url('bubbleD-left.png');
  border-image-slice:78 66 66 116 fill;
  border-image-width:26px 22px 22px 38px;
  padding:13px 14px 9px 28px;
}
[data-bubble="D"] .msg-row.right .has-avatar .bubble{
  margin-right:-15px;
  margin-top:-2px;
  border-image-source:url('bubbleD-right.png');
  border-image-slice:78 116 66 66 fill;
  border-image-width:26px 38px 22px 22px;
  padding:13px 28px 9px 14px;
}

/* ============ MODERN STYLE (现代风) ============ */
[data-style="modern"] .bubble{
  background:var(--white);border-radius:21px;
  box-shadow:var(--shadow-sm);border:none;
  font-size:15px;color:var(--text-primary);
}
[data-style="modern"] .msg-row.right .bubble{
  background:var(--gray-800);color:var(--white);border-radius:21px;
}
/* Modern tail - left side */
[data-style="modern"] .msg-row.left .has-avatar .bubble::after{
  content:'';position:absolute;top:14px;left:-4px;
  width:8px;height:8px;background:var(--white);
  transform:rotate(45deg);border-radius:1px;
}
/* Modern tail - right side */
[data-style="modern"] .msg-row.right .has-avatar .bubble::after{
  content:'';position:absolute;top:14px;right:-4px;
  width:8px;height:8px;background:var(--gray-800);
  transform:rotate(45deg);border-radius:1px;
}
[data-style="modern"] .msg-row.left .no-avatar .bubble{
  background:var(--gray-200);border-radius:14px;
}

/* ============ EMOTION: EXCITED ============ */
[data-style="comic"] .bubble[data-emotion="excited"]{
  box-shadow:none;
}
[data-style="comic"] .has-avatar .bubble[data-emotion="excited"].show{
  animation:bubble-pop-left var(--bubble-duration) var(--bubble-easing) both;
}
.msg-row.right .has-avatar .bubble[data-emotion="excited"].show{
  animation:bubble-pop-right var(--bubble-duration) var(--bubble-easing) both;
}
[data-style="modern"] .bubble[data-emotion="excited"]{
  box-shadow:0 2px 12px rgba(0,0,0,.08);
}
/* Sparkle - 兴奋元素 */
.sparkles{display:none;position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;overflow:visible}
.bubble[data-emotion="excited"].show .sparkles{display:block}
.sparkle{
  position:absolute;
  width:19px;height:16px;
  background-size:contain;background-repeat:no-repeat;
  opacity:0;animation:excited-pop 0.6s ease forwards, excited-shake 0.4s ease-in-out 0.6s infinite;
}
.msg-row.left .sparkle{top:-7px;right:-9px;background-image:url('兴奋.png');animation:excited-pop 0.6s ease forwards, excited-shake 1.2s ease-in-out 0.6s infinite}
.msg-row.right .sparkle{top:-7px;left:-9px;background-image:url('兴奋.png');animation:excited-pop-r 0.6s ease forwards, excited-shake-r 1.2s ease-in-out 0.6s infinite}
@keyframes excited-pop{
  0%{opacity:0;transform:scale(0) rotate(0deg)}
  20%{opacity:1;transform:scale(1.4) rotate(20deg)}
  35%{opacity:1;transform:scale(0.9) rotate(-10deg)}
  50%{opacity:1;transform:scale(1.15) rotate(15deg)}
  65%{opacity:1;transform:scale(0.95) rotate(-5deg)}
  80%{opacity:1;transform:scale(1.05) rotate(8deg)}
  100%{opacity:1;transform:scale(1) rotate(12deg)}
}
@keyframes excited-pop-r{
  0%{opacity:0;transform:scale(0) rotate(0deg) scaleX(-1)}
  20%{opacity:1;transform:scale(1.4) rotate(-20deg) scaleX(-1)}
  35%{opacity:1;transform:scale(0.9) rotate(10deg) scaleX(-1)}
  50%{opacity:1;transform:scale(1.15) rotate(-15deg) scaleX(-1)}
  65%{opacity:1;transform:scale(0.95) rotate(5deg) scaleX(-1)}
  80%{opacity:1;transform:scale(1.05) rotate(-8deg) scaleX(-1)}
  100%{opacity:1;transform:scale(1) rotate(-12deg) scaleX(-1)}
}
@keyframes excited-shake{
  0%,100%{transform:rotate(12deg) translateY(0)}
  33%{transform:rotate(10deg) translateY(-1px)}
  66%{transform:rotate(14deg) translateY(0.5px)}
}
@keyframes excited-shake-r{
  0%,100%{transform:rotate(-12deg) scaleX(-1) translateY(0)}
  33%{transform:rotate(-10deg) scaleX(-1) translateY(-1px)}
  66%{transform:rotate(-14deg) scaleX(-1) translateY(0.5px)}
}
/* WoW元素：左侧消息右下角，右侧消息左下角（按Figma尺寸） */
.sparkle-wow{
  position:absolute;
  width:25px;height:22px;
  background:url('WoW.png') center/contain no-repeat;
  opacity:0;
  animation:wow-pop 0.5s cubic-bezier(.34,1.56,.64,1) 0.3s forwards, wow-bounce 1.4s ease-in-out 0.8s infinite;
}
.bubble[data-emotion="excited"].show .sparkle-wow{display:block}
.msg-row.left .sparkle-wow{bottom:-8px;right:-6px}
.msg-row.right .sparkle-wow{bottom:-8px;left:-6px}
.msg-row.right .sparkle-wow{
  animation:wow-pop-r 0.5s cubic-bezier(.34,1.56,.64,1) 0.3s forwards, wow-bounce-r 1.4s ease-in-out 0.8s infinite;
}
@keyframes wow-pop{
  0%{opacity:0;transform:scale(0) rotate(15deg)}
  60%{opacity:1;transform:scale(1.2) rotate(-20deg)}
  100%{opacity:1;transform:scale(1) rotate(-13deg)}
}
@keyframes wow-pop-r{
  0%{opacity:0;transform:scale(0) rotate(-15deg) scaleX(-1)}
  60%{opacity:1;transform:scale(1.2) rotate(20deg) scaleX(-1)}
  100%{opacity:1;transform:scale(1) rotate(13deg) scaleX(-1)}
}
@keyframes wow-bounce{
  0%,100%{transform:scale(1) translateY(0) rotate(-13deg)}
  50%{transform:scale(1.08) translateY(-2px) rotate(-10deg)}
}
@keyframes wow-bounce-r{
  0%,100%{transform:scale(1) scaleX(-1) translateY(0) rotate(13deg)}
  50%{transform:scale(1.08) scaleX(-1) translateY(-2px) rotate(10deg)}
}
@keyframes bubble-pop-in{
  0%{transform:scale(0.5) translateX(-4px);opacity:0}
  60%{transform:scale(1.03) translateX(1px);opacity:1}
  100%{transform:scale(1) translateX(0)}
}
@keyframes comic-bounce{
  0%{transform:scale(.4) translateX(-8px)}
  50%{transform:scale(1.04) translateX(1px)}
  75%{transform:scale(.98) translateX(0)}
  100%{transform:scale(1) translateX(0)}
}

  30%{transform:translateX(var(--shake-distance)) scale(1)}
  45%{transform:translateX(calc(-0.8 * var(--shake-distance))) scale(1)}
  60%{transform:translateX(calc(0.8 * var(--shake-distance))) scale(1)}
  75%{transform:translateX(calc(-0.3 * var(--shake-distance))) scale(1)}

/* 普通气泡(A)粒子位置补偿：A的margin比C多14px，粒子整体保持贴合 */

/* ============ EMOTION: SAD ============ */
[data-style="comic"] .bubble[data-emotion="sad"]{

}
[data-style="comic"] .has-avatar .bubble[data-emotion="sad"].show{
  animation:bubble-pop-left var(--bubble-duration) var(--bubble-easing) both, sad-droop 2.4s ease-in-out var(--bubble-duration) infinite;
}
.msg-row.right .has-avatar .bubble[data-emotion="sad"].show{
  animation:bubble-pop-right var(--bubble-duration) var(--bubble-easing) both, sad-droop 2.4s ease-in-out var(--bubble-duration) infinite;
}
.sad-marks{display:none;position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;overflow:visible}
.bubble[data-emotion="sad"].show .sad-marks{display:block}
.sad-mark{position:absolute;opacity:0}
/* 泪滴 —— 气泡右上角外侧 (Figma: left:106, top:-8) */
.sad-mark.sad-1{animation:sad-pop 0.6s ease-out 0s forwards, sad-fly 2.2s ease-out 0.6s infinite}
.msg-row.left .sad-mark.sad-1{top:-8px;right:-3px}

/* 泡泡气泡(D) 难过粒子位置补偿 */
[data-bubble="D"] .msg-row.left .sad-mark.sad-1{right:1px}
[data-bubble="D"] .msg-row.right .sad-mark.sad-1{left:1px}
/* 普通气泡(A) 难过粒子位置补偿（整体往形象方向偏移，贴合气泡）*/
[data-bubble="A"] .msg-row.left .sad-mark.sad-1{right:-11px}
[data-bubble="A"] .msg-row.right .sad-mark.sad-1{left:-11px}

  100%{opacity:1;transform:scale(1) translate(0,0)}
}
/* 泪滴向外飞散（右上方，幅度收敛）—— 主泪滴 */
@keyframes sad-fly{
  0%{opacity:1;transform:translate(0,0) scale(1) rotate(0deg)}
  60%{opacity:1;transform:translate(4px,-6px) scale(0.95) rotate(10deg)}
  100%{opacity:0;transform:translate(7px,-10px) scale(0.7) rotate(18deg)}
}

/* 右侧消息镜像飞行方向（飞向左上）*/
.msg-row.right .sad-mark.sad-1{animation:sad-pop 0.6s ease-out 0s forwards, sad-fly-right 2.2s ease-out 0.6s infinite}
@keyframes sad-fly-right{
  0%{opacity:1;transform:translate(0,0) scale(1) rotate(0deg)}
  60%{opacity:1;transform:translate(-4px,-6px) scale(0.95) rotate(-10deg)}
  100%{opacity:0;transform:translate(-7px,-10px) scale(0.7) rotate(-18deg)}
}

  50%{filter:brightness(0.97)}
}

/* ============ 动画强度分档（L1 极轻 · L2 轻度 · L3 中度 · L4 强烈）============ */
/* L1 极轻：仅粒子效果（默认即为这种，无需额外样式）*/

/* ---- L2 轻度：气泡自身微动（呼吸/脉冲，针对不同情绪有对应节律）---- */
[data-intensity="2"] .bubble[data-emotion="excited"].show{
  animation:bubble-pop-left var(--bubble-duration) var(--bubble-easing) both,
            l2-beat 0.9s ease-in-out var(--bubble-duration) 3 !important;
}

}

  animation:bubble-pop-left var(--bubble-duration) var(--bubble-easing) both,
            l2-heartbeat 1.2s ease-in-out var(--bubble-duration) 3 !important;
}
[data-intensity="2"] .msg-row.right .bubble[data-emotion="love"].show{
  animation:bubble-pop-right var(--bubble-duration) var(--bubble-easing) both,
            l2-heartbeat 1.2s ease-in-out var(--bubble-duration) 3 !important;
}
[data-intensity="2"] .bubble[data-emotion="angry"].show,
[data-intensity="2"] .msg-row.right .bubble[data-emotion="angry"].show{
  animation:bubble-pop-left var(--bubble-duration) var(--bubble-easing) both,
            shake var(--shake-duration) ease var(--bubble-duration),
            l2-tremor 0.12s linear var(--bubble-duration) 8 !important;
}
[data-intensity="2"] .bubble[data-emotion="sad"].show{
  animation:bubble-pop-left var(--bubble-duration) var(--bubble-easing) both,
            l2-droop 1.6s ease-in-out var(--bubble-duration) 2 !important;
}
[data-intensity="2"] .msg-row.right .bubble[data-emotion="sad"].show{
  animation:bubble-pop-right var(--bubble-duration) var(--bubble-easing) both,
            l2-droop 1.6s ease-in-out var(--bubble-duration) 2 !important;
}
[data-intensity="2"] .bubble[data-emotion="sleepy"].show{
  animation:bubble-pop-left var(--bubble-duration) var(--bubble-easing) both,

@keyframes l2-beat{

}
@keyframes l2-heartbeat{

/* ---- L3 中度：反应式（L2 基础 + 气泡放大、光晕、对头像/他人产生外溢响应）---- */
[data-intensity="3"] .bubble[data-emotion="excited"].show{

@keyframes l3-pulse-joy{
  0%,100%{transform:scale(1);filter:brightness(1)}
  50%{transform:scale(1.08) rotate(-1deg);filter:brightness(1.08)}
}
@keyframes l3-rage-glow{
  0%,100%{transform:scale(1);filter:drop-shadow(0 0 0 rgba(255,80,80,0))}
  50%{transform:scale(1.05);filter:drop-shadow(0 0 8px rgba(255,80,80,.5))}
}
@keyframes l3-love-glow{
  0%,100%{transform:scale(1);filter:drop-shadow(0 0 0 rgba(255,105,180,0))}
  50%{transform:scale(1.05);filter:drop-shadow(0 0 10px rgba(255,105,180,.55))}
}
@keyframes l3-sad-heavy{
  0%,100%{transform:translateY(0) scale(1);filter:saturate(1)}
  50%{transform:translateY(3px) scale(.98);filter:saturate(.7) brightness(.95)}
}
@keyframes l3-sleepy-drift{
  0%,100%{transform:translateY(0) rotate(0deg);opacity:1}
  50%{transform:translateY(2px) rotate(2deg);opacity:.85}
}
@keyframes l3-confused-wobble{
  0%,100%{transform:rotate(0deg)}
  25%{transform:rotate(-3deg)}
  75%{transform:rotate(3deg)}
}
@keyframes l3-avatar-hop{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-6px)}
}
@keyframes l3-avatar-shake{
  0%,100%{transform:translateX(0)}
  25%{transform:translateX(-3px)}
  75%{transform:translateX(3px)}
}
@keyframes l3-avatar-hug{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.06) rotate(-3deg)}
}

/* ---- L4 强烈：接入现有「对话角力」王者效果 + 其他情绪也有强烈响应 ---- */
/* L4 下，任何有情绪的气泡都在短时间内变成"主角"（放大、光晕）；动画播完后自动回到原始态 */
[data-intensity="4"][data-demo="game"] .msg-row.angry-king{z-index:20}
[data-intensity="4"] .bubble[data-emotion="excited"].show,
[data-intensity="4"] .msg-row.right .bubble[data-emotion="excited"].show{
  animation:bubble-pop-left var(--bubble-duration) var(--bubble-easing) both,
            l4-dominant 1.2s cubic-bezier(.34,1.56,.64,1) var(--bubble-duration) !important;
  transform-origin:left center;
}
[data-intensity="4"] .msg-row.right .bubble[data-emotion="excited"].show{
  animation-name:bubble-pop-right, l4-dominant-right !important;
  transform-origin:right center;
}
[data-intensity="4"] .bubble[data-emotion="love"].show{
  animation:bubble-pop-left var(--bubble-duration) var(--bubble-easing) both,
            l4-love-blast 1.2s cubic-bezier(.34,1.56,.64,1) var(--bubble-duration) !important;
  transform-origin:left center;
}
[data-intensity="4"] .msg-row.right .bubble[data-emotion="love"].show{
  animation:bubble-pop-right var(--bubble-duration) var(--bubble-easing) both,
            l4-love-blast-right 1.2s cubic-bezier(.34,1.56,.64,1) var(--bubble-duration) !important;
  transform-origin:right center;
}
[data-intensity="4"] .bubble[data-emotion="sad"].show{
  animation:bubble-pop-left var(--bubble-duration) var(--bubble-easing) both,
            l4-sad-break 1.5s cubic-bezier(.4,0,.2,1) var(--bubble-duration) !important;
  transform-origin:left center;
}
[data-intensity="4"] .msg-row.right .bubble[data-emotion="sad"].show{
  animation:bubble-pop-right var(--bubble-duration) var(--bubble-easing) both,
            l4-sad-break-right 1.5s cubic-bezier(.4,0,.2,1) var(--bubble-duration) !important;
  transform-origin:right center;
}
[data-intensity="4"] .bubble[data-emotion="confused"].show{
  animation:bubble-pop-left var(--bubble-duration) var(--bubble-easing) both,
            l4-confused-storm 1.4s ease-in-out var(--bubble-duration) !important;
  transform-origin:left center;
}
[data-intensity="4"] .msg-row.right .bubble[data-emotion="confused"].show{
  animation:bubble-pop-right var(--bubble-duration) var(--bubble-easing) both,
            l4-confused-storm-right 1.4s ease-in-out var(--bubble-duration) !important;
  transform-origin:right center;
}
[data-intensity="4"] .bubble[data-emotion="sleepy"].show{
  animation:bubble-pop-left var(--bubble-duration) var(--bubble-easing) both,
            l4-sleepy-fade 1.8s ease-in-out var(--bubble-duration) !important;
  transform-origin:left center;
}
[data-intensity="4"] .msg-row.right .bubble[data-emotion="sleepy"].show{
  animation:bubble-pop-right var(--bubble-duration) var(--bubble-easing) both,
            l4-sleepy-fade 1.8s ease-in-out var(--bubble-duration) !important;
  transform-origin:right center;
}

/* L4 keyframes —— 高潮在中段，100% 回到原始态（不保留放大/滤镜）*/
@keyframes l4-dominant{
  0%{transform:scale(1);filter:none}
  40%{transform:scale(1.18);filter:drop-shadow(0 0 10px rgba(255,200,80,.6)) drop-shadow(0 0 20px rgba(255,200,80,.3))}
  70%{transform:scale(1.1);filter:drop-shadow(0 0 6px rgba(255,200,80,.4))}
  100%{transform:scale(1);filter:none}
}
@keyframes l4-dominant-right{
  0%{transform:scale(1);filter:none}
  40%{transform:scale(1.18);filter:drop-shadow(0 0 10px rgba(255,200,80,.6)) drop-shadow(0 0 20px rgba(255,200,80,.3))}
  70%{transform:scale(1.1);filter:drop-shadow(0 0 6px rgba(255,200,80,.4))}
  100%{transform:scale(1);filter:none}
}
@keyframes l4-love-blast{
  0%{transform:scale(1);filter:none}
  30%{transform:scale(1.22) rotate(-3deg);filter:drop-shadow(0 0 12px rgba(255,105,180,.7))}
  60%{transform:scale(1.12) rotate(0deg);filter:drop-shadow(0 0 8px rgba(255,105,180,.4))}
  100%{transform:scale(1) rotate(0deg);filter:none}
}
@keyframes l4-love-blast-right{
  0%{transform:scale(1);filter:none}
  30%{transform:scale(1.22) rotate(3deg);filter:drop-shadow(0 0 12px rgba(255,105,180,.7))}
  60%{transform:scale(1.12) rotate(0deg);filter:drop-shadow(0 0 8px rgba(255,105,180,.4))}
  100%{transform:scale(1) rotate(0deg);filter:none}
}
@keyframes l4-sad-break{
  0%{transform:scale(1) translateY(0) rotate(0);filter:saturate(1)}
  50%{transform:scale(.94) translateY(6px) rotate(-2deg);filter:saturate(.4) brightness(.88) drop-shadow(0 0 10px rgba(89,147,255,.35))}
  80%{transform:scale(.97) translateY(3px) rotate(-1deg);filter:saturate(.7) brightness(.94)}
  100%{transform:scale(1) translateY(0) rotate(0);filter:saturate(1) brightness(1)}
}
@keyframes l4-sad-break-right{
  0%{transform:scale(1) translateY(0) rotate(0);filter:saturate(1)}
  50%{transform:scale(.94) translateY(6px) rotate(2deg);filter:saturate(.4) brightness(.88) drop-shadow(0 0 10px rgba(89,147,255,.35))}
  80%{transform:scale(.97) translateY(3px) rotate(1deg);filter:saturate(.7) brightness(.94)}
  100%{transform:scale(1) translateY(0) rotate(0);filter:saturate(1) brightness(1)}
}
@keyframes l4-confused-storm{
  0%{transform:rotate(0) scale(1);filter:none}
  20%{transform:rotate(-5deg) scale(1.04)}
  40%{transform:rotate(5deg) scale(1.06);filter:drop-shadow(0 0 6px rgba(138,91,255,.4))}
  60%{transform:rotate(-3deg) scale(1.05)}
  80%{transform:rotate(3deg) scale(1.03)}
  100%{transform:rotate(0) scale(1);filter:none}
}
@keyframes l4-confused-storm-right{
  0%{transform:rotate(0) scale(1);filter:none}
  20%{transform:rotate(5deg) scale(1.04)}
  40%{transform:rotate(-5deg) scale(1.06);filter:drop-shadow(0 0 6px rgba(138,91,255,.4))}
  60%{transform:rotate(3deg) scale(1.05)}
  80%{transform:rotate(-3deg) scale(1.03)}
  100%{transform:rotate(0) scale(1);filter:none}
}
@keyframes l4-sleepy-fade{
  0%{transform:scale(1) translateY(0);opacity:1;filter:none}
  50%{transform:scale(.95) translateY(4px);opacity:.8;filter:blur(.3px) brightness(.95)}
  100%{transform:scale(1) translateY(0);opacity:1;filter:none}
}
/* L4 下仅「愤怒」会压制其他气泡（走原有的 angry-king 逻辑），其他情绪不影响他人 */


/* ============ TYPING CURSOR (隐藏) ============ */
.typing-cursor{display:none!important}

/* ============ TYPING INDICATOR (dot animation) ============ */
.typing-indicator{
  display:flex;align-items:center;gap:3px;
  padding:12px 16px;
}
.typing-indicator .dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--gray-400);
  animation:typing-dot 1.2s ease-in-out infinite;
}
.typing-indicator .dot:nth-child(2){animation-delay:.15s}
.typing-indicator .dot:nth-child(3){animation-delay:.3s}
@keyframes typing-dot{
  0%,60%,100%{transform:translateY(0);opacity:.4}
  30%{transform:translateY(-4px);opacity:1}
}

/* ============ INPUT AREA ============ */
.input-area{
  flex-shrink:0;background:var(--gray-100);
  border-top:1px solid var(--border);
}
.input-top{
  display:flex;align-items:center;gap:0;
  padding:8px 16px;height:56px;
}
.input-field-wrap{
  flex:1;height:40px;background:var(--white);border-radius:20px;
  display:flex;align-items:center;padding:0 14px;
  border:1px solid var(--border);
  transition:border-color .2s;
}
.input-field-wrap:focus-within{border-color:rgba(0,0,0,.15)}
.input-field{
  flex:1;height:100%;border:none;outline:none;
  font-size:15px;color:var(--text-primary);
  font-family:var(--font);background:transparent;
}
.input-field::placeholder{color:var(--text-tertiary);font-size:14px}
.send-btn{
  width:40px;height:40px;border-radius:20px;border:none;cursor:pointer;
  background:var(--gray-800);
  color:var(--white);font-size:16px;font-weight:600;font-family:var(--font);
  display:flex;align-items:center;justify-content:center;
  margin-left:8px;transition:all .2s;flex-shrink:0;
  box-shadow:0 2px 6px rgba(0,0,0,.12);
}
.send-btn:hover{background:var(--black);box-shadow:0 3px 10px rgba(0,0,0,.18)}
.send-btn:active{transform:scale(.94)}
.send-btn:disabled{background:var(--gray-300);color:var(--gray-500);cursor:not-allowed;transform:none;box-shadow:none}
.send-btn svg{width:18px;height:18px}

/* Toolbar */
.input-toolbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:2px 32px 4px;height:34px;
}
.input-toolbar .toolbar-icon{
  width:28px;height:28px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;opacity:.5;transition:opacity .2s;
}
.input-toolbar .toolbar-icon:hover{opacity:.8}
.input-toolbar .toolbar-icon img{width:28px;height:28px}

/* ============ HOME INDICATOR ============ */
.home-indicator{
  height:34px;display:flex;align-items:center;justify-content:center;
  background:var(--gray-100);flex-shrink:0;
}
.home-indicator span{width:134px;height:5px;border-radius:3px;background:var(--black);opacity:.12}

/* ============ HINT ============ */
.hint{color:var(--text-tertiary);font-size:11px;margin-top:16px;text-align:center;letter-spacing:.3px}

/* ============ 气泡样式切换悬浮面板 ============ */
.bubble-style-popup{
  position:sticky;top:50%;z-index:50;
  display:none;
  flex-direction:column;align-items:center;gap:8px;
  padding:0;margin:-20px auto 0;
  pointer-events:none;
}
.bubble-style-popup.show{
  display:flex;
}
.bubble-style-popup .style-toggle,
.bubble-style-popup .demo-mode-toggle,
.bubble-style-popup .intensity-toggle{
  pointer-events:auto;
  box-shadow:0 4px 16px rgba(0,0,0,.12);
  background:rgba(255,255,255,.95);
  backdrop-filter:blur(12px);
  border-radius:10px;
  padding:3px;
  display:flex;
}
.demo-mode-toggle button{
  padding:6px 14px;border:none;cursor:pointer;
  font-size:11px;font-weight:600;font-family:var(--font);
  color:var(--text-secondary);background:transparent;
  border-radius:8px;transition:all .25s;
}
.demo-mode-toggle button.active{
  background:linear-gradient(135deg,#6B5BFF 0%,#8B5CF6 100%);
  color:#fff;
  box-shadow:0 2px 8px rgba(107,91,255,.4);
}
/* 动画强度切换器 */
.intensity-toggle button{
  padding:6px 12px;border:none;cursor:pointer;
  font-size:11px;font-weight:600;font-family:var(--font);
  color:var(--text-secondary);background:transparent;
  border-radius:8px;transition:all .25s;
}
.intensity-toggle button.active{
  background:linear-gradient(135deg,#FF6B9D 0%,#FF5B5B 100%);
  color:#fff;
  box-shadow:0 2px 8px rgba(255,91,91,.4);
}

/* ============ 游戏化 Demo ============ */
/* 物品物理下落 */
.falling-item{
  position:absolute;
  font-size:24px;line-height:1;
  width:24px;height:24px;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;
  z-index:60;
  filter:drop-shadow(0 2px 3px rgba(0,0,0,.2));
  will-change:transform,left,top;
  user-select:none;
}
.falling-item.item-landed{
  position:absolute;
  z-index:5;
  animation:item-sway 2.5s ease-in-out infinite;
  transform-origin:bottom center;
}
/* 被碰撞的气泡抖动 */
[data-demo="game"] .msg-row .bubble.bubble-hit{
  animation:bubble-hit-shake 0.4s cubic-bezier(.36,.07,.19,.97) both !important;
}
@keyframes bubble-hit-shake{
  0%,100%{transform:translate(0,0) rotate(0)}
  20%{transform:translate(-3px,1px) rotate(-1deg)}
  40%{transform:translate(3px,-1px) rotate(1deg)}
  60%{transform:translate(-2px,2px) rotate(-0.5deg)}
  80%{transform:translate(2px,0) rotate(0.5deg)}
}
@keyframes item-sway{
  0%,100%{transform:rotate(0deg) translateY(0)}
  50%{transform:rotate(-6deg) translateY(-2px)}
}

/* 话题共鸣连线（心电图/闪电波风格） */
.resonance-link-layer{overflow:visible;pointer-events:none}
.resonance-link{
  /* 尖峰路径用扫描入场 */
}
.resonance-dot{
  animation:resonance-dot-pulse 1s ease-in-out infinite;
  transform-origin:center;transform-box:fill-box;
}
@keyframes resonance-dot-pulse{
  0%,100%{r:3;opacity:0.7}
  50%{r:5;opacity:1}
}

/* 气泡共鸣 —— 全屏鬼畜气泡特效 */
.resonance-fx{
  position:absolute;inset:0;
  pointer-events:none;z-index:90;
  overflow:hidden;
}
.rfx-bubble-wrap{
  position:absolute;bottom:-80px;
  opacity:0;
  animation:rfx-fly 2.8s cubic-bezier(.4,0,.2,1) both;
  transform-origin:center;
}
.rfx-bubble-wrap .msg-row{
  min-height:auto !important;
  opacity:1 !important;
}
.rfx-bubble-wrap .bubble{
  animation:none !important;
  max-width:180px;
  white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;
  transform:none !important;opacity:1 !important;
}
@keyframes rfx-fly{
  0%{
    transform:translateY(0) translateX(0) rotate(var(--rot,0deg)) scale(var(--s,1));
    opacity:0;
  }
  8%{opacity:1}
  85%{opacity:1}
  100%{
    transform:translateY(-120vh) translateX(var(--drift,0)) rotate(var(--rot-end,30deg)) scale(var(--s,1));
    opacity:0;
  }
}

/* 空间队列效果已移除 */

/* 对话角力：场上唯一王者带红光晕，其他被压制 */
[data-demo="game"] .msg-row.angry-king{
  z-index:20;position:relative;
}
[data-demo="game"] .msg-row.angry-king .bubble{
  transform:scale(1.2) !important;
  filter:drop-shadow(0 0 12px rgba(255,80,80,.7)) drop-shadow(0 0 24px rgba(255,80,80,.4));
  transition:transform .5s cubic-bezier(.34,1.56,.64,1), filter .5s ease;
  animation:angry-king-pulse 1.2s ease-in-out infinite, angry-king-shake 0.6s cubic-bezier(.34,1.56,.64,1) both !important;
  position:relative;
}
@keyframes angry-king-pulse{
  0%,100%{filter:drop-shadow(0 0 12px rgba(255,80,80,.7)) drop-shadow(0 0 24px rgba(255,80,80,.4))}
  50%{filter:drop-shadow(0 0 18px rgba(255,80,80,.9)) drop-shadow(0 0 32px rgba(255,80,80,.6))}
}
@keyframes angry-king-shake{
  0%{transform:scale(1)}
  20%{transform:scale(1.25) rotate(-2deg)}
  40%{transform:scale(1.35) rotate(2deg)}
  60%{transform:scale(1.3) rotate(-1deg)}
  80%{transform:scale(1.22) rotate(1deg)}
  100%{transform:scale(1.2)}
}
/* 冲击波 */
[data-demo="game"] .msg-row.angry-king::before{
  content:'';position:absolute;
  left:50%;top:50%;width:20px;height:20px;
  border:3px solid rgba(255,80,80,.6);
  border-radius:50%;
  transform:translate(-50%,-50%);
  animation:shockwave 0.8s ease-out forwards;
  pointer-events:none;z-index:15;
}
@keyframes shockwave{
  0%{width:20px;height:20px;opacity:0.8;border-width:3px}
  100%{width:320px;height:320px;opacity:0;border-width:1px}
}
/* 败者：整体缩小+被推远，保持内部相对位置 */
[data-demo="game"] .msg-row.angry-loser{
  animation:angry-loser-push 0.8s cubic-bezier(.4,0,.2,1) forwards !important;
  transform-origin:left center;
  filter:grayscale(0.6) brightness(0.85) opacity(0.6);
  transition:filter .6s ease;
}
.msg-row.right.angry-loser{
  transform-origin:right center;
  animation:angry-loser-push-right 0.8s cubic-bezier(.4,0,.2,1) forwards !important;
}
@keyframes angry-loser-push{
  0%{transform:translateX(0) scale(1)}
  30%{transform:translateX(-4px) scale(0.9)}
  60%{transform:translateX(-8px) scale(0.78)}
  85%{transform:translateX(-9px) scale(0.72)}
  100%{transform:translateX(-10px) scale(0.7)}
}
@keyframes angry-loser-push-right{
  0%{transform:translateX(0) scale(1)}
  30%{transform:translateX(4px) scale(0.9)}
  60%{transform:translateX(8px) scale(0.78)}
  85%{transform:translateX(9px) scale(0.72)}
  100%{transform:translateX(10px) scale(0.7)}
}

/* 阵营投票 */
/* 阵营投票：顶部计分条 */
.faction-scoreboard{
  display:flex;align-items:center;justify-content:center;gap:10px;
  padding:8px 14px;
  background:linear-gradient(90deg,rgba(107,91,255,.12) 0%,rgba(255,255,255,.6) 50%,rgba(236,72,153,.12) 100%);
  border-bottom:1px solid var(--border);
  font-size:13px;font-weight:600;
  position:relative;
  animation:fsb-slide-down .4s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes fsb-slide-down{
  0%{transform:translateY(-100%);opacity:0}
  100%{transform:translateY(0);opacity:1}
}
.faction-scoreboard .side-a,.faction-scoreboard .side-b{
  display:flex;align-items:center;gap:6px;
  padding:2px 10px;border-radius:12px;
  background:rgba(255,255,255,.7);
}
.faction-scoreboard .side-a{color:#6B5BFF}
.faction-scoreboard .side-b{color:#EC4899}
.faction-scoreboard .dot{
  width:8px;height:8px;border-radius:50%;
}
.faction-scoreboard .side-a .dot{background:#6B5BFF;box-shadow:0 0 6px rgba(107,91,255,.5)}
.faction-scoreboard .side-b .dot{background:#EC4899;box-shadow:0 0 6px rgba(236,72,153,.5)}
.faction-scoreboard .count{
  font-weight:800;font-size:14px;
  min-width:14px;text-align:center;
}
.faction-scoreboard .vs{
  font-weight:900;color:var(--gray-500);font-size:12px;
  animation:vs-pulse 1.2s ease-in-out infinite;
}
@keyframes vs-pulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.15)}
}
.faction-scoreboard .fsb-close{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  width:20px;height:20px;line-height:18px;text-align:center;
  border-radius:50%;background:rgba(0,0,0,.08);
  cursor:pointer;font-size:14px;color:var(--gray-600);
  transition:background .2s;
}
.faction-scoreboard .fsb-close:hover{background:rgba(0,0,0,.15)}

/* 消息分阵营显示：整体缩小并靠边，保留内部布局 */
[data-demo="game"] .msg-row.faction-a{
  align-self:flex-start;
  display:inline-flex;
  flex-shrink:0;
  transform-origin:left center;
  transform:scale(0.8);
  background:linear-gradient(90deg,rgba(107,91,255,.12) 0%,transparent 60%);
  border-left:3px solid rgba(107,91,255,.6);
  padding-left:4px;
  border-radius:0 12px 12px 0;
  animation:faction-msg-in-left .45s cubic-bezier(.34,1.56,.64,1) both;
}
[data-demo="game"] .msg-row.faction-b{
  align-self:flex-end;
  display:inline-flex;
  flex-shrink:0;
  transform-origin:right center;
  transform:scale(0.8);
  background:linear-gradient(90deg,transparent 40%,rgba(236,72,153,.12) 100%);
  border-right:3px solid rgba(236,72,153,.6);
  padding-right:4px;
  border-radius:12px 0 0 12px;

  function detectEmotion(text) {
    const excitedWords = ['哈哈','太好了','冲冲冲','好开心','开心死','好棒','太棒','耶！','！！','!!','awsl','绝了','好耶','万岁','啦啦啦','666','好激动','好兴奋','爱死了','太赞','爽翻'];

    const loveWords = ['爱你','喜欢你','么么','mua','亲亲','爱了','心动','好爱','太爱','暗恋','表白','恋爱','甜蜜','♡','❤','想你','抱抱','宝贝'];
    const sleepyWords = ['困了','困死','好困','睡觉','睡了','zzz','ZZZ','zZ','累死','好累','熬夜','打哈欠','哈欠','想睡','晚安','洗洗睡','床上见','早点睡'];
    const confusedWords = ['什么','为啥','不懂','？？','??','看不懂','怎么回事','啥意思','为什么','咋回事','搞不懂','迷惑','疑惑','谁','哪里','怎么','咋','啥','蒙了','懵'];
    const sadWords = ['难过','伤心','哭了','哭泣','呜呜','555','T T','TT','T_T','QAQ','qaq','心碎','难受','委屈','想哭','泪目','破防','好惨','emo','丧','郁闷','失落','崩溃','绝望','失望'];
    const lowerText = text.toLowerCase();
    for (const w of angryWords) { if (lowerText.includes(w)) return 'angry'; }
    for (const w of sadWords) { if (lowerText.includes(w)) return 'sad'; }
    for (const w of sleepyWords) { if (lowerText.includes(w)) return 'sleepy'; }
    for (const w of loveWords) { if (lowerText.includes(w)) return 'love'; }
    for (const w of confusedWords) { if (lowerText.includes(w)) return 'confused'; }
    for (const w of excitedWords) { if (lowerText.includes(w)) return 'excited'; }
    return 'neutral';
  }

  /* ============ TTS 语音播放（Edge TTS 云端） ============ */
  const sharedAudio = document.createElement('audio');
  sharedAudio.setAttribute('playsinline', '');
  sharedAudio.setAttribute('webkit-playsinline', '');
  sharedAudio.setAttribute('x5-playsinline', '');
  sharedAudio.style.display = 'none';
  sharedAudio.volume = 0.85;
  document.body.appendChild(sharedAudio);

  let audioUnlocked = false;
  const ttsQueue = [];
  let ttsPlaying = false;

  /* 微信环境检测 */
  const isWechat = /MicroMessenger/i.test(navigator.userAgent);

  function getTtsUrl(text, voiceConfig) {
    if (!voiceConfig || !voiceConfig.voiceName) return null;
    const cleanText = text
      .replace(/[\(（][^\)）]*[\)）][ノゞ♪♡~～シ]*/g, '')
      .replace(/[✨⭐💫✦♡✧★☆♪·:]/g, '')
      .replace(/[+]+/g, '加')
      .replace(/[^\u4e00-\u9fa5a-zA-Z0-9，。！？、～~\s]/g, '')
      .trim();
    if (!cleanText || cleanText.length < 2) return null;
    const TTS_BASE = 'https://edge-tts-server-mu.vercel.app';
    const voice = encodeURIComponent(voiceConfig.voiceName);
    const encoded = encodeURIComponent(cleanText);
    const rate = encodeURIComponent(voiceConfig.rate || '+0%');
    const pitch = encodeURIComponent(voiceConfig.pitch || '+0Hz');
    return `${TTS_BASE}/tts?voice=${voice}&text=${encoded}&rate=${rate}&pitch=${pitch}`;
  }

  function playNextTts() {
    if (ttsQueue.length === 0) { ttsPlaying = false; return; }
    ttsPlaying = true;
    const url = ttsQueue.shift();
    sharedAudio.src = url;
    sharedAudio.load();
    sharedAudio.play().catch(() => { playNextTts(); });
  }

  sharedAudio.addEventListener('ended', playNextTts);
  sharedAudio.addEventListener('error', playNextTts);

  function speakText(text, voiceConfig) {
    const url = getTtsUrl(text, voiceConfig);
    if (!url) return;
    ttsQueue.push(url);
    if (!ttsPlaying) playNextTts();
  }

    if (typeof WeixinJSBridge !== 'undefined') {

  /* ============ 打字机效果 ============ */
  function typeWriter(el, text, callback) {
    if (!el || !text) { if (callback) callback(); return; }
    const textSpan = el.querySelector('.bubble-text');
    if (!textSpan) {
      /* 找不到 .bubble-text，直接把文本写进 el */
      el.textContent = text;
      if (callback) callback();
      return;
    }
    const cursor = el.querySelector('.typing-cursor');
    textSpan.textContent = '';
    if (cursor) cursor.style.display = 'inline-block';

    /* 预分割文本为 chunk 数组 */
    const chunks = [];
    let j = 0;
    while (j < text.length) {
      if (text[j] === '(' || text[j] === '（') {
        const close1 = text.indexOf(')', j);
        const close2 = text.indexOf('）', j);
        let closeAt = -1;
        if (close1 > -1 && close2 > -1) closeAt = Math.min(close1, close2);
        else if (close1 > -1) closeAt = close1;
        else if (close2 > -1) closeAt = close2;
        if (closeAt > j) {
          let end = closeAt + 1;
          while (end < text.length && /[ノゞ♪♡~～！!\u{1F600}-\u{1F64F}シ]/u.test(text[end])) end++;
          chunks.push(text.substring(j, end));
          j = end;
        } else {
          chunks.push(text[j]);
          j++;
        }
      } else if (/[！!？?。，、…~]/.test(text[j])) {
        let end = j + 1;
        while (end < text.length && /[！!？?。，、…~]/.test(text[end])) end++;
        chunks.push(text.substring(j, end));
        j = end;
      } else {
        chunks.push(text[j]);
        j++;
      }
    }

    let i = 0;
    function typeNext() {
      if (i >= chunks.length) {
        if (cursor) cursor.style.display = 'none';
        /* 最终保底：确保完整文本已写入 */
        if (textSpan.textContent !== text) textSpan.textContent = text;
        if (callback) callback();
        return;
      }
      textSpan.textContent += chunks[i];
      i++;
      msgList.scrollTop = msgList.scrollHeight;
      addTimeout(typeNext, CHAR_SPEED);
    }
    typeNext();
  }

  /* ============ 渐显效果（蛋黄用） ============ */
  function fadeInText(el, text, callback) {
    if (!el || !text) { if (callback) callback(); return; }
    const textSpan = el.querySelector('.bubble-text');
    if (!textSpan) { if (callback) callback(); return; }
    textSpan.textContent = text;
    textSpan.style.opacity = '0';
    textSpan.style.transition = 'opacity .35s ease';
    requestAnimationFrame(() => { textSpan.style.opacity = '1'; });
    addTimeout(() => { if (callback) callback(); }, 400);
  }

    /* 物品物理下落：从屏幕顶部落下，碰撞上方气泡反弹，最终粘到目标气泡 */
    dropItem(emoji, targetBubble) {
      if (!emoji || !targetBubble) return;
      const phone = document.querySelector('.phone-frame');
      const msgListEl = document.getElementById('msgList');
      if (!phone || !msgListEl) return;
      const phoneRect = phone.getBoundingClientRect();
      const targetRect = targetBubble.getBoundingClientRect();
      /* 目标气泡在phone内的相对位置（顶部中心） */
      const targetX = targetRect.left - phoneRect.left + targetRect.width / 2;
      const targetY = targetRect.top - phoneRect.top - 4;
      /* 创建掉落元素 */
      const el = document.createElement('div');
      el.className = 'falling-item';
      el.textContent = emoji;
      /* 起点：目标气泡上方 ~180px（不超过消息区域顶部），带随机X偏移 */
      const maxDropHeight = 180;
      const startX = targetX + (Math.random() - 0.5) * 60;
      const startY = Math.max(targetY - maxDropHeight, 0);
      el.style.left = startX + 'px';
      el.style.top = startY + 'px';
      phone.appendChild(el);
      /* 找出目标气泡上方、起点下方的气泡（碰撞范围内） */
      const allBubbles = Array.from(msgListEl.querySelectorAll('.msg-row .bubble'))
        .filter(b => b !== targetBubble)
        .map(b => {
          const r = b.getBoundingClientRect();
          return {
            el: b,
            x: r.left - phoneRect.left,
            y: r.top - phoneRect.top,
            w: r.width,
            h: r.height,
          };
        })
        .filter(b => b.y > startY && b.y < targetY);
      /* 物理模拟 */
      let x = startX, y = startY;
      let vx = 0, vy = 0;
      const gravity = 0.6;
      const bounce = 0.5; /* 反弹系数 */
      const friction = 0.85; /* 水平摩擦 */
      let landed = false;
      let lastT = performance.now();
      const hitBubbles = new Set();
      function step(now) {
        if (landed) return;
        const dt = Math.min(32, now - lastT);
        lastT = now;
        /* 每帧施加重力 */
        vy += gravity * (dt / 16);
        x += vx * (dt / 16);
        y += vy * (dt / 16);
        /* 检查是否到达目标气泡 */
        if (y >= targetY - 4) {
          y = targetY - 4;
          landed = true;
          /* 贴到目标气泡上，作为其子元素（跟随气泡滚动） */
          el.style.transition = 'transform .2s cubic-bezier(.34,1.56,.64,1)';
          el.style.transform = 'scale(1.2) rotate(-8deg)';
          setTimeout(() => {
            el.style.transform = 'scale(1) rotate(0deg)';
          }, 200);
          /* 附加到气泡上，使其随消息滚动 */
          setTimeout(() => {
            el.classList.add('item-landed');
            el.style.left = '';
            el.style.top = '-20px';
            el.style.right = '6px';
            el.style.transform = '';
            el.style.transition = '';
            if (!targetBubble.style.position) targetBubble.style.position = 'relative';
            targetBubble.appendChild(el);
          }, 400);
          return;
        }
        /* 碰撞检测：上方气泡 */
        for (const b of allBubbles) {
          if (hitBubbles.has(b.el)) continue;
          const itemW = 24, itemH = 24;
          if (x + itemW > b.x && x < b.x + b.w &&
              y + itemH > b.y && y < b.y + b.h) {
            /* 命中气泡顶部：反弹 */
            hitBubbles.add(b.el);
            vy = -Math.abs(vy) * bounce;
            /* 给水平一个推力（偏向目标方向） */
            const dir = targetX > x ? 1 : -1;
            vx += dir * (1 + Math.random());
            /* 被撞气泡产生抖动反馈 */
            b.el.classList.add('bubble-hit');
            setTimeout(() => b.el.classList.remove('bubble-hit'), 400);
            /* 让物品离开气泡上方一点防止反复碰撞 */
            y = b.y - itemH - 1;
            break;
          }
        }
        vx *= friction;
        /* 限制掉出屏幕 */
        if (x < 0) { x = 0; vx = Math.abs(vx); }
        if (x > phoneRect.width - 24) { x = phoneRect.width - 24; vx = -Math.abs(vx); }
        /* 超时保护 */
        if (y > phoneRect.height + 50) { el.remove(); return; }
        el.style.left = x + 'px';
        el.style.top = y + 'px';
        requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    },

    /* 共鸣检测：最近3条是否内容相似 */
    recentTexts: [], /* {text, normalized, senderName, avatar, rowEl} */
    normalize(t) {

    pushText(entry) {
      this.recentTexts.push(entry);
      if (this.recentTexts.length > 5) this.recentTexts.shift();

    checkResonance() {
      const n = this.recentTexts.length;
      if (n < 3) return null;
      const last3 = this.recentTexts.slice(-3);
      const norm = last3[0].normalized;
      if (!norm || norm.length < 1) return null;
      const senders = new Set(last3.map(e=>e.senderName));
      if (senders.size < 3) return null;
      const allSame = last3.every(e => e.normalized === norm);
      if (!allSame) return null;
      return last3;

    /* 对话角力：相邻两个有形象用户的愤怒气泡才对战 */
    applyAngryPush(newRow, emotion, member, text) {
      if (emotion !== 'angry') return;
      if (!member || !member.hasAvatar) return;
      /* 找上一条相邻的msg-row */
      const rows = Array.from(msgList.querySelectorAll('.msg-row'));
      const idx = rows.indexOf(newRow);
      if (idx < 1) return; /* 没有前一条，不触发 */
      const prev = rows[idx - 1];

      const prevBubble = prev.querySelector('.bubble');
      if (!prevBubble || prevBubble.getAttribute('data-emotion') !== 'angry') return;
      /* 计算两者力量，决定王者 */
      const newPower = (text ? text.length : 1) * 10 + Math.floor(Math.random() * 30);
      const prevPower = prev._angryPower || ((prev.querySelector('.bubble-text')?.textContent?.length || 1) * 10);
      newRow._angryPower = newPower;
      /* 清理之前的状态 */
      rows.forEach(r => r.classList.remove('angry-king','angry-loser'));
      if (newPower >= prevPower) {
        newRow.classList.add('angry-king');
        prev.classList.add('angry-loser');

        prev.classList.add('angry-king');
        newRow.classList.add('angry-loser');
      }
      /* 记录当前对战双方，用于清场 */
      this._angryRivals = [newRow, prev];
      clearTimeout(this._angryClearTimer);
      this._angryClearTimer = setTimeout(() => {
        if (this._angryRivals) {
          this._angryRivals.forEach(r => {

    /* 阵营投票：检测"A还是B"句式 */
    activeFaction: null, /* { optA, optB, countA, countB, scoreboard } */
    detectFaction(text) {
      const patterns = [
        /(.{1,6})还是(.{1,6})[?？]?$/,
        /(.{1,6})or(.{1,6})[?？]?$/i,
        /选(.{1,6})还是(.{1,6})/,
      ];
      for (const p of patterns) {
        const m = text.match(p);
        if (m) {
          const a = m[1].trim().replace(/[?？.,。，是选]/g,'');
          const b = m[2].trim().replace(/[?？.,。，]/g,'');
          if (a && b && a.length <= 6 && b.length <= 6 && a !== b) {
            return { optA: a, optB: b };
          }
        }
      }
      return null;
    },
    startFaction(optA, optB) {
      /* 清理旧面板 */
      const old = document.getElementById('factionScoreboard');
      if (old) old.remove();
      this.activeFaction = { optA, optB, countA: 0, countB: 0 };
      /* 创建计分条（chat-header 下方） */
      const bar = document.createElement('div');
      bar.id = 'factionScoreboard';
      bar.className = 'faction-scoreboard';
      bar.innerHTML = `
        <span class="side-a">
          <span class="dot"></span>
          <span class="label">${optA}</span>
          <span class="count" id="fsbCountA">0</span>
        </span>
        <span class="vs">VS</span>
        <span class="side-b">
          <span class="count" id="fsbCountB">0</span>
          <span class="label">${optB}</span>
          <span class="dot"></span>
        </span>
        <span class="fsb-close" id="fsbClose">×</span>
      `;
      const chatHeader = document.querySelector('.chat-header');
      if (chatHeader && chatHeader.parentNode) {
        chatHeader.parentNode.insertBefore(bar, chatHeader.nextSibling);
      }
      const closeBtn = document.getElementById('fsbClose');
      if (closeBtn) closeBtn.onclick = () => { this.endFaction(); };
      /* 超时自动关闭 */
      clearTimeout(this._factionTimer);
      this._factionTimer = setTimeout(() => this.endFaction(), 60000);
    },
    endFaction() {
      this.activeFaction = null;
      const bar = document.getElementById('factionScoreboard');
      if (bar) bar.remove();
      /* 清除所有消息的faction标记 */
      document.querySelectorAll('.msg-row.faction-a, .msg-row.faction-b').forEach(r => {
        r.classList.remove('faction-a','faction-b');
      });
    },
    /* 给消息应用阵营（根据回复文本决定） */
    assignFactionToRow(row, replyText, preAssignedSide) {
      if (!this.activeFaction || !row) return;
      let side = preAssignedSide;
      if (!side) {
        const lower = replyText.toLowerCase();
        const aMatch = lower.includes(this.activeFaction.optA.toLowerCase());
        const bMatch = lower.includes(this.activeFaction.optB.toLowerCase());
        if (aMatch && !bMatch) side = 'a';
        else if (bMatch && !aMatch) side = 'b';
        else {
          /* 如果没明确，根据票数平衡分配，票少的一边优先 */
          if (this.activeFaction.countA < this.activeFaction.countB) side = 'a';
          else if (this.activeFaction.countB < this.activeFaction.countA) side = 'b';
          else side = Math.random() < 0.5 ? 'a' : 'b';
        }
      }
      if (side === 'a') {
        row.classList.add('faction-a');
        this.activeFaction.countA++;
        const el = document.getElementById('fsbCountA');
        if (el) el.textContent = this.activeFaction.countA;
      } else {
        row.classList.add('faction-b');
        this.activeFaction.countB++;
        const el = document.getElementById('fsbCountB');
        if (el) el.textContent = this.activeFaction.countB;
      }
    },

    tryDrawResonanceLine(newRow, member, text) {

      /* 创建 SVG 层 */

        msgListEl.appendChild(svg);
      }
      svg.style.height = msgListEl.scrollHeight + 'px';

      const dx = bx - ax;
      const dy = by - ay;
      const len = Math.sqrt(dx*dx + dy*dy);
      const angle = Math.atan2(dy, dx);
      const segCount = Math.max(20, Math.floor(len / 8));
      const nx = -Math.sin(angle);
      const ny = Math.cos(angle);

      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('class', 'resonance-link');
      path.setAttribute('stroke', 'url(#resonance-grad)');
      path.setAttribute('stroke-width', '0.8');
      path.setAttribute('fill', 'none');
      path.setAttribute('stroke-linecap', 'round');
      path.setAttribute('stroke-linejoin', 'round');
      path.setAttribute('filter', 'url(#resonance-glow)');
      svg.appendChild(path);

      /* 生成动态波形路径的函数：t0 是时间偏移量 */
      function buildPath(phase) {
        const pts = [];
        for (let i = 0; i <= segCount; i++) {
          const t = i / segCount;
          const baseX = ax + dx * t;
          const baseY = ay + dy * t;
          /* 心电图 + 流动脉冲：主脉冲位置随时间移动 */
          let amp = 0;
          /* 找出当前脉冲中心位置（沿线来回移动） */
          const pulseCenter = 0.3 + 0.4 * (0.5 + 0.5 * Math.sin(phase * 2));
          const distFromPulse = Math.abs(t - pulseCenter);
          if (distFromPulse < 0.12) {
            /* 心电波形 */
            const local = (t - (pulseCenter - 0.12)) / 0.24;
            if (local < 0.2) amp = 3;
            else if (local < 0.32) amp = -8;
            else if (local < 0.44) amp = 22;
            else if (local < 0.56) amp = -14;
            else if (local < 0.72) amp = 4;
            else if (local < 0.85) amp = 6;
            else amp = 0;
          } else {
            /* 其他区域：细微噪波 + 低频波浪 */
            const jitter = Math.sin(t * 30 + phase * 5) * 1.2;
            const wave = Math.sin(t * 8 + phase * 3) * 2;
            amp = jitter + wave;
          }
          pts.push([baseX + nx * amp, baseY + ny * amp]);
        }
        let d = `M ${pts[0][0].toFixed(1)} ${pts[0][1].toFixed(1)}`;
        for (let i = 1; i < pts.length; i++) {
          d += ` L ${pts[i][0].toFixed(1)} ${pts[i][1].toFixed(1)}`;
        }
        return d;
      }

      /* 初始扫描入场 */
      let startTime = performance.now();
      let phase = 0;
      let running = true;
      function animate(now) {
        if (!running || !path.parentNode) return;
        phase = (now - startTime) / 1000;
        path.setAttribute('d', buildPath(phase));
        requestAnimationFrame(animate);
      }
      /* 入场 dash 扫描 */
      requestAnimationFrame(animate);
      /* 首次设置 dasharray 扫出入场 */
      setTimeout(() => {
        try {
          const L = path.getTotalLength();
          path.style.strokeDasharray = L;
          path.style.strokeDashoffset = L;
          path.style.transition = 'stroke-dashoffset 0.8s ease-out';
          requestAnimationFrame(() => { path.style.strokeDashoffset = '0'; });
          setTimeout(() => {
            /* 入场完成后清除dash，让线保持完整 */
            path.style.strokeDasharray = '';
            path.style.strokeDashoffset = '';
            path.style.transition = '';
          }, 900);
        } catch(e) {}
      }, 0);

      /* 4秒后淡出 */
      setTimeout(() => {
        if (path.parentNode) {
          path.style.transition = 'opacity .6s';
          path.style.opacity = '0';
        }
        setTimeout(() => {
          running = false;
          if (path.parentNode) path.remove();
        }, 600);
      }, 4000);
    },
  };

  /* 当前Demo模式 */
  function isGameMode() { return document.body.getAttribute('data-demo') === 'game'; }

  /* ============ 创建消息 DOM ============ */
  function createMessageEl(member, text, emotion, side) {
    msgCounter++;
    const id = 'msg-' + msgCounter;
    const bubbleId = 'bubble-' + msgCounter;
    const avatarId = 'avatar-' + msgCounter;

    const row = document.createElement('div');
    row.className = 'msg-row ' + side;
    row.id = id;

    let sparklesHTML = '';
    let angerHTML = '';
    let confusedHTML = '';
    let loveHTML = '';
    let sleepyHTML = '';
    let sadHTML = '';
    if (emotion === 'excited') {
      sparklesHTML = '<div class="sparkles"><span class="sparkle"></span><span class="sparkle-wow"></span></div>';
    } else if (emotion === 'angry') {
      angerHTML = '<div class="anger-marks"><span class="anger-mark anger-icon"><img src="愤怒.png" alt=""></span><span class="anger-mark anger-exclaim"><img src="生气感叹号.png" alt=""></span></div>';

      sleepyHTML = '<div class="sleepy-marks"><span class="sleepy-mark z-1"></span><span class="sleepy-mark z-2"></span><span class="sleepy-mark z-3"></span></div>';
    } else if (emotion === 'sad') {
      sadHTML = '<div class="sad-marks"><span class="sad-mark sad-1"><img src="泪滴.svg" alt=""></span></div>';
    }

    const nameAlign = side === 'right' ? 'text-align:right' : '';

    /* 游戏化：检测物品，物理下落（仅有形象用户） */
    const itemEmoji = (isGameMode() && member.hasAvatar) ? GameMode.detectItem(text) : null;

    if (member.hasAvatar) {
      const avatarImg = (emotion === 'angry' && member.avatar2) ? member.avatar2 : member.avatar;
      const hasVideo = !!member.video;
      let avatarContent;
      if (hasVideo) {
        avatarContent = `<video src="${member.video}" muted autoplay loop playsinline preload="auto" class="blend-white"></video>`;
      } else {
        avatarContent = `<img src="${avatarImg}" alt="${member.name}">`;

          <span class="sender-name">${member.name}</span>
          <div class="bubble" data-emotion="neutral" id="${bubbleId}">

  }

  /* ============ 动画播放单条消息 ============ */
  function animateMessage(msgData, callback, skipSpeak) {
    const { row, bubbleId, avatarId, hasAvatar, text, voice, member, emotion, itemEmoji, factionSide } = msgData;

    msgList.appendChild(row);
    if (emptyState) emptyState.style.display = 'none';

    /* 游戏化：检查气泡共鸣（推入后若成立则合并） */
    if (isGameMode() && member) {
      const entry = {
        text, normalized: GameMode.normalize(text),
        senderName: member.name, avatar: member.avatar, member, rowEl: row
      };
      const resonance = GameMode.pushText(entry);
      if (resonance) {
        /* 延迟执行，等当前row加入后再合并 */
        setTimeout(() => GameMode.createResonance(resonance), 100);
      }
      /* 角力 */
      if (emotion === 'angry') {
        setTimeout(() => GameMode.applyAngryPush(row, emotion, member, text), 100);
      }
      /* 阵营标记：仅给左侧消息（群成员回复） */
      if (GameMode.activeFaction && row.classList.contains('left')) {
        setTimeout(() => GameMode.assignFactionToRow(row, text, factionSide), 50);
      }
      /* 物品下落：等气泡显示后触发 */
      if (itemEmoji) {
        setTimeout(() => {
          const b = row.querySelector('.bubble');
          if (b) GameMode.dropItem(itemEmoji, b);
        }, 600);
      }
      /* 话题共鸣连线：有形象用户聊相同话题时连接 */
      if (member && member.hasAvatar) {
        setTimeout(() => GameMode.tryDrawResonanceLine(row, member, text), 800);
      }
    }

    /* 直接从 row 内部查找 bubble，避免 getElementById 查不到 */
    const bubbleEl = row.querySelector('.bubble');
    const avatarEl = row.querySelector('.avatar-character');

    requestAnimationFrame(() => {
      row.classList.add('show');
      msgList.scrollTop = msgList.scrollHeight;

      if (hasAvatar) {
        const avatar = avatarEl || document.getElementById(avatarId);
        if (!avatar) { if (callback) callback(); return; }
        const videoEl = avatar.querySelector('video');
        if (videoEl) {
          videoEl.play().catch(() => {});
        }
        addTimeout(() => {
          avatar.classList.add('show');
          addTimeout(() => {
            avatar.classList.add('speaking');
            addTimeout(() => {
              const bubble = bubbleEl || document.getElementById(bubbleId);
              if (!bubble) { avatar.classList.remove('speaking'); if (callback) callback(); return; }
              const ts = bubble.querySelector('.bubble-text');
              if (ts) ts.textContent = text;
              bubble.classList.add('show');
              /* 文本写入后检测：两行时补偿 cell 高度 */
              requestAnimationFrame(() => {
                if (bubble.offsetHeight > 60) {
                  row.style.minHeight = (90 + bubble.offsetHeight - 54) + 'px';
                }
              });
              if (!skipSpeak) speakText(text, voice);
              addTimeout(() => {
                avatar.classList.remove('speaking');
                msgList.scrollTop = msgList.scrollHeight;
                if (callback) callback();
              }, SPEAK_END_DELAY);
            }, BUBBLE_APPEAR_DELAY);
          }, AVATAR_SPEAK_DELAY);
        }, AVATAR_SHOW_DELAY);
      } else {
        /* 无 avatar：气泡渐显，文字直接显示 */
        addTimeout(() => {
          const bubble = bubbleEl || document.getElementById(bubbleId);
          if (!bubble) { if (callback) callback(); return; }
          bubble.classList.add('show');
          if (!skipSpeak) speakText(text, voice);
          addTimeout(() => {
            fadeInText(bubble, text, () => {
              const ts = bubble.querySelector('.bubble-text');
              if (ts && !ts.textContent && text) ts.textContent = text;
              /* 文本写入后检测：两行时补偿 cell 高度 */
              requestAnimationFrame(() => {
                if (bubble.offsetHeight > 60) {
                  row.style.minHeight = (90 + bubble.offsetHeight - 54) + 'px';
                }
              });
              msgList.scrollTop = msgList.scrollHeight;
              if (callback) callback();
            });
          }, NO_AVATAR_TEXT_DELAY);
        }, NO_AVATAR_DELAY);
      }
    });
  }

  function generateReplies(userText) {
    const emotion = detectEmotion(userText);

    /* 游戏化模式：复读触发检测 */
    const gameMode = isGameMode();
    const REPEAT_TRIGGERS = ['+1','复读','同意','赞同','666','好的','收到','确实','对对对','真的','是的','yep','ok'];
    const hasRepeatTrigger = REPEAT_TRIGGERS.some(k => userText.toLowerCase().includes(k.toLowerCase()));
    /* 游戏化模式下：只有含触发词时才强制复读 */
    const forceRepeat = gameMode && hasRepeatTrigger;

    /* 分组：有形象 vs 普通头像 */
    const avatarMembers = MEMBERS.filter(m => m.hasAvatar);
    const normalMembers = MEMBERS.filter(m => !m.hasAvatar);

    /* 各组随机选一个，确保至少各有一个 */
    const pickAvatar = avatarMembers.sort(() => Math.random() - 0.5);
    const pickNormal = normalMembers.sort(() => Math.random() - 0.5);

    const repliers = [];
    if (pickNormal.length) repliers.push(pickNormal[0]);
    if (pickAvatar.length) repliers.push(pickAvatar[0]);

    /* 随机再多加 1-2 个（从剩余成员中选） */
    const remaining = MEMBERS.filter(m => !repliers.includes(m)).sort(() => Math.random() - 0.5);
    let extraCount = Math.random() < 0.4 ? 1 : (Math.random() < 0.7 ? 0 : 2);
    /* 复读模式需要至少3个成员 */
    if (forceRepeat) extraCount = Math.max(1, extraCount);
    /* 投票模式需要至少3个成员（保证两边都有人且有热度） */
    if (gameMode && GameMode.activeFaction && repliers.length + extraCount < 3) {
      extraCount = 3 - repliers.length;
    }
    for (let e = 0; e < extraCount && e < remaining.length; e++) {
      repliers.push(remaining[e]);
    }

    /* 打乱回复顺序 */
    repliers.sort(() => Math.random() - 0.5);

    /* 投票模式：预分配站队，保证两边都有人 */
    let factionSides = [];
    if (gameMode && GameMode.activeFaction && repliers.length > 0) {
      const f = GameMode.activeFaction;
      /* 确保前两个分别站A和B */
      for (let i = 0; i < repliers.length; i++) {
        if (i === 0) {
          factionSides.push(f.countA <= f.countB ? 'a' : 'b');
        } else if (i === 1) {
          factionSides.push(factionSides[0] === 'a' ? 'b' : 'a');
        } else {
          factionSides.push(Math.random() < 0.5 ? 'a' : 'b');
        }
      }
    }

    const replies = [];
    for (let idx = 0; idx < repliers.length; idx++) {
      const member = repliers[idx];
      let text = '';
      let replyEmotion = emotion;

      /* 游戏化-复读模式：直接复读用户内容 */
      if (forceRepeat) {
        text = userText;
        replies.push({ member, text, emotion: replyEmotion });
        continue;
      }

      /* 游戏化-投票模式：按预分配站队发言 */
      if (gameMode && GameMode.activeFaction && factionSides[idx]) {
        const f = GameMode.activeFaction;
        const side = factionSides[idx];
        const opt = side === 'a' ? f.optA : f.optB;
        const templates = [
          `必须${opt}啊`, `当然${opt}`, `${opt}+1`, `我选${opt}`,
          `${opt}yyds`, `投${opt}一票`, `我站${opt}`, `${opt}无脑冲`,
        ];
        text = templates[Math.floor(Math.random() * templates.length)];
        replies.push({ member, text, emotion: 'neutral', factionSide: side });
        continue;
      }

      /* 先尝试话题匹配 */
      let matched = false;
      for (const [pattern, roleReplies] of Object.entries(TOPIC_REPLIES)) {
        const regex = new RegExp(pattern);
        if (regex.test(userText)) {
          const pool = roleReplies[member.personality];
          if (pool && pool.length) {
            text = pool[Math.floor(Math.random() * pool.length)];
            matched = true;
            break;
          }
        }
      }

      /* 没匹配到话题就用情绪回复 */
      if (!matched) {
        const pool = member.responses[emotion] || member.responses.neutral;
        text = pool[Math.floor(Math.random() * pool.length)];
      }

      if (member.personality === 'chill' && Math.random() < 0.5) replyEmotion = 'neutral';
      if (member.personality === 'cool' && Math.random() < 0.4) replyEmotion = 'neutral';
      replies.push({ member, text, emotion: replyEmotion });
    }

    return replies;
  }
