  /* 依次播放回复 */
  function playReplies(replies, idx) {
    if (idx >= replies.length) return;

    const { member, text, emotion, factionSide } = replies[idx];
    const msgData = createMessageEl(member, text, emotion, 'left');
    if (factionSide) msgData.factionSide = factionSide;
    animateMessage(msgData, () => {
      addTimeout(() => playReplies(replies, idx + 1), REPLY_GAP_MIN + Math.random() * REPLY_GAP_RAND);
    });
  }

  /* ============ 发送消息 ============ */
  function sendMessage() {
    const text = inputField.value.trim();
    if (!text) return;

    /* 在用户点击的同步调用栈中立刻 play 解锁 audio（Safari 要求） */
    const selfUrl = getTtsUrl(text, SELF.voice);
    if (selfUrl) {
      ttsQueue.length = 0; /* 清空之前的队列 */
      sharedAudio.src = selfUrl;
      sharedAudio.play().catch(() => {});
      ttsPlaying = true;
      audioUnlocked = true;
    }

    const emotion = detectEmotion(text);
    const msgData = createMessageEl(SELF, text, emotion, 'right');

    inputField.value = '';
    sendBtn.disabled = true;

    animateMessage(msgData, () => {
      /* 游戏化：检测阵营投票 */
      if (isGameMode()) {
        const faction = GameMode.detectFaction(text);
        if (faction) {
          GameMode.startFaction(faction.optA, faction.optB);
        }
      }
      /* 延迟后触发群成员回复 */
      const delay = REPLY_START_DELAY_MIN + Math.random() * REPLY_START_DELAY_RAND;
      addTimeout(() => {
        const replies = generateReplies(text);
        playReplies(replies, 0);
      }, delay);
    }, true); /* skipSpeak: 自己的语音已在上面同步播放 */
  }

  /* ============ 输入事件 ============ */

  /* 移动端键盘弹起处理：消息滚到底部 */
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', () => {
      msgList.scrollTop = msgList.scrollHeight;
    });
  }
  inputField.addEventListener('focus', () => {
    setTimeout(() => {
      msgList.scrollTop = msgList.scrollHeight;
      inputField.scrollIntoView({ block: 'nearest' });
    }, 300);
  });

  inputField.addEventListener('input', () => {
    sendBtn.disabled = inputField.value.trim().length === 0;
  });

  /* 处理中文输入法 */
  let isComposing = false;
  inputField.addEventListener('compositionstart', () => { isComposing = true; });
  inputField.addEventListener('compositionend', () => {
    isComposing = false;
    sendBtn.disabled = inputField.value.trim().length === 0;
  });

  inputField.addEventListener('keydown', (e) => {
    /* keyCode 229 = IME 处理中，不发送 */
    if (e.keyCode === 229) return;
    if (e.key === 'Enter' && !e.isComposing && !isComposing && inputField.value.trim()) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener('click', () => {
    if (inputField.value.trim()) sendMessage();
  });

  /* ============ 清空对话 ============ */
  document.getElementById('btnClear').addEventListener('click', () => {
    timeouts.forEach(t => clearTimeout(t));
    timeouts = [];
    ttsQueue.length = 0;
    ttsPlaying = false;
    try { sharedAudio.pause(); } catch(e) {}
    msgList.innerHTML = '';
    msgCounter = 0;
    if (GameMode) { GameMode.recentTexts = []; if (GameMode.endFaction) GameMode.endFaction(); }
    const es = document.createElement('div');
    es.className = 'empty-state';
    es.id = 'emptyState';
    es.innerHTML = `
      <div class="empty-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
        </svg>
      </div>
      <div class="empty-title">发送一条消息试试</div>
      <div class="empty-desc">输入文字发送后，群成员会回应你<br>有 Avatar 的角色会有说话动画和打字机效果</div>
    `;
    msgList.appendChild(es);
    emptyState = es;
  });

  /* ============ 半屏形象面板 ============ */
  const avatarSheet = document.getElementById('avatarSheet');
  const avatarSheetOverlay = document.getElementById('avatarSheetOverlay');
  const avatarSheetImg = document.getElementById('avatarSheetImg');
  const avatarSheetClose = document.getElementById('avatarSheetClose');
  const osBubble = document.getElementById('osBubble');
  const osText = document.getElementById('osText');

  /* 记录最近聊天内容用于生成 OS */
  let recentMessages = [];

  /* OS 内心独白模板 */
  const OS_TEMPLATES = {
    'cool-guy': [
      '（其实刚才那个挺好笑的…但我不能笑）',
      '（这群人…还挺有意思的）',
      '（假装很酷其实已经在偷笑了）',
      '（表面淡定内心疯狂点头）',
      '（不能让他们看出来我很开心）',
    ],
    'chill': [
      '（好饿…等聊完去吃东西）',
      '（今天也是平静的一天呢）',
      '（嗯…他们好像很开心的样子）',
      '（困了但不好意思说…）',
    ],
    'bubbly': [
      '（啊好开心大家都在！）',
      '（要不要发个表情包呢…）',
      '（今天的聊天好有趣！）',
      '（希望他们也觉得我有意思）',
    ],
    'cool': [
      '（嘻嘻被发现了吗~）',
      '（今天的氛围好好啊～）',
      '（其实我刚才想了好久才回的）',
      '（希望大家都能出去玩！）',
    ],
    'sweet': [
      '（好想跟大家一直聊下去♡）',
      '（每次聊天都好开心的说～）',
      '（悄悄截了个图…太可爱了）',
      '（好幸福有这样的朋友们～）',
    ],
  };

  /* 根据成员的 slogan 或性格模板生成 OS */
  function generateOS(member) {
    /* 优先使用人设 slogan（所有成员统一为 slogan 风格）*/
    if (member.slogan) return member.slogan;
    if (member === SELF) return '做最真实的自己';
    const pool = OS_TEMPLATES[member.personality] || OS_TEMPLATES['chill'];
    return pool[Math.floor(Math.random() * pool.length)];
  }

  /* 我的 slogan 候选池（编辑页快速换一条）*/
  const SELF_SLOGAN_PRESETS = [
    '江湖再远 执剑相随',
    '清风自来 花落无声',
    '少年侠气 交结五都雄',
    '一蓑烟雨任平生',
    '愿得一心人 白首不相离',
    '且将新火试新茶 诗酒趁年华',
    '山河不足重 重在遇知己',
    '闲敲棋子落灯花',
  ];

  let currentSheetMember = null;

  const avatarSheetTitle = document.getElementById('avatarSheetTitle');

  function openAvatarSheet(member) {
    if (!member || !member.hasAvatar) return;
    currentSheetMember = member;
    avatarSheetImg.src = member.avatar;
    avatarSheetImg.alt = member.name;
    avatarSheetTitle.textContent = (member === SELF) ? '我的QQ秀' : member.name + '的QQ秀';
    /* 标记当前是否为我的半屏，用于控制底部工具栏显隐 */
    avatarSheet.setAttribute('data-self', member === SELF ? 'true' : 'false');
    osText.textContent = '';
    avatarSheet.classList.add('show');
    avatarSheetOverlay.classList.add('show');
    /* 打字机效果显示OS */
    const osContent = generateOS(member);
    /* 记录当前 OS 内容到气泡上，供点击播放使用 */
    osBubble.dataset.osContent = osContent;
    let osIdx = 0;
    function typeOS() {
      if (osIdx < osContent.length) {
        osText.textContent += osContent[osIdx];
        osIdx++;
        setTimeout(typeOS, 60);
      } else {
        /* 其他成员：完整显示后自动播放；我的：不自动播放，等点击气泡 */
        if (member !== SELF) {
          playOsVoice(osContent, member);
        }
      }
    }
    setTimeout(typeOS, 500);
  }

  /* 播放内心OS语音：去掉外层括号并使用 whisper 效果（慢速低音） */
  function playOsVoice(osContent, member) {
    if (!member || !member.voice) return;
    /* 去除全角/半角括号，保留内部文字 */
    const innerText = osContent.replace(/[\(（\)）]/g, '').trim();
    if (!innerText) return;
    /* 构造一个临时 voice 配置：慢速+降调，像内心独白 */
    const whisperVoice = {
      voiceName: member.voice.voiceName,
      rate: '-15%',
      pitch: '-3Hz',
    };
    speakText(innerText, whisperVoice);
  }

  function closeAvatarSheet() {
    avatarSheet.classList.remove('show');
    avatarSheetOverlay.classList.remove('show');
    currentSheetMember = null;
    /* 同时关闭编辑页（若打开中）*/
    const ed = document.getElementById('selfEditor');
    if (ed) ed.classList.remove('show');
    /* 停止OS语音 */
    try {
      ttsQueue.length = 0;
      sharedAudio.pause();
      sharedAudio.currentTime = 0;
      ttsPlaying = false;
    } catch(e) {}
  }

  avatarSheetClose.addEventListener('click', closeAvatarSheet);
  avatarSheetOverlay.addEventListener('click', closeAvatarSheet);

  /* 点击 OS 气泡：
   * - 我的：打开编辑页（编辑 slogan / 音色）
   * - 其他成员：播放内心独白语音（whisper）
   */
  osBubble.addEventListener('click', (e) => {
    e.stopPropagation();
    if (!currentSheetMember) return;
    if (currentSheetMember === SELF) {
      openSelfEditor();
      return;
    }
    const content = osBubble.dataset.osContent || osText.textContent;
    if (!content) return;
    playOsVoice(content, currentSheetMember);
  });

  /* 触摸下滑关闭 */
  let sheetTouchStartY = 0;
  avatarSheet.addEventListener('touchstart', (e) => {
    sheetTouchStartY = e.touches[0].clientY;
  }, { passive: true });
  avatarSheet.addEventListener('touchend', (e) => {
    const dy = e.changedTouches[0].clientY - sheetTouchStartY;
    if (dy > 80) closeAvatarSheet();
  });

  /* ============ 我的编辑页 ============ */
  const VOICE_PRESETS = [
    { voiceName: 'zh-CN-YunxiNeural',     label: '云希',   desc: '少年·温润',  rate: '-5%', pitch: '-2Hz' },
    { voiceName: 'zh-CN-YunyangNeural',   label: '云扬',   desc: '沉稳·磁性',  rate: '+0%', pitch: '+0Hz' },
    { voiceName: 'zh-CN-YunjianNeural',   label: '云健',   desc: '豪气·有力',  rate: '+0%', pitch: '-1Hz' },
    { voiceName: 'zh-CN-YunhaoNeural',    label: '云皓',   desc: '阳光·暖厚',  rate: '+0%', pitch: '+0Hz' },
    { voiceName: 'zh-CN-XiaoxiaoNeural',  label: '晓晓',   desc: '甜美·亲切',  rate: '+0%', pitch: '+2Hz' },
    { voiceName: 'zh-CN-XiaoyiNeural',    label: '晓伊',   desc: '活泼·少女',  rate: '+0%', pitch: '+2Hz' },
    { voiceName: 'zh-CN-XiaochenNeural',  label: '晓辰',   desc: '知性·温和',  rate: '+0%', pitch: '+0Hz' },
    { voiceName: 'zh-CN-XiaomengNeural',  label: '晓梦',   desc: '软糯·俏皮',  rate: '+0%', pitch: '+3Hz' },
  ];
  const selfEditor       = document.getElementById('selfEditor');
  const selfEditorBack   = document.getElementById('selfEditorBack');
  const selfEditorSave   = document.getElementById('selfEditorSave');
  const selfSloganInput  = document.getElementById('selfSloganInput');
  const selfSloganCount  = document.getElementById('selfSloganCount');
  const selfSloganChips  = document.getElementById('selfSloganChips');
  const selfVoiceList    = document.getElementById('selfVoiceList');

  let pendingVoice = null; // 编辑过程中的临时音色

  /* 渲染 slogan chips */
  function renderSloganChips(){
    selfSloganChips.innerHTML = '';
    SELF_SLOGAN_PRESETS.forEach(s => {
      const chip = document.createElement('div');
      chip.className = 'self-slogan-chip';
      chip.textContent = s;
      chip.addEventListener('click', () => {
        selfSloganInput.value = s;
        updateSloganCount();
        selfSloganInput.focus();
      });
      selfSloganChips.appendChild(chip);
    });
  }

  /* 渲染音色列表 */
  function renderVoiceList(){
    selfVoiceList.innerHTML = '';
    VOICE_PRESETS.forEach(v => {
      const item = document.createElement('div');
      item.className = 'self-voice-item';
      if (pendingVoice && pendingVoice.voiceName === v.voiceName) item.classList.add('active');
      item.innerHTML = `
        <div class="self-voice-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M15.54 8.46a5 5 0 010 7.07"/>
            <path d="M19.07 4.93a10 10 0 010 14.14"/>
          </svg>
        </div>
        <div class="self-voice-name">${v.label}</div>
        <div class="self-voice-desc">${v.desc}</div>
        <div class="self-voice-preview">点击试听</div>
      `;
      item.addEventListener('click', () => {
        pendingVoice = { ...v };
        renderVoiceList();
        /* 试听当前 slogan（或默认 "你好呀，我是..."）*/
        const preview = (selfSloganInput.value || SELF.slogan || '你好呀 我是 ' + SELF.name).trim();
        try {
          ttsQueue.length = 0;
          sharedAudio.pause();
          sharedAudio.currentTime = 0;
          ttsPlaying = false;
        } catch(e){}
        speakText(preview, { voiceName: v.voiceName, rate: '-5%', pitch: v.pitch });
      });
      selfVoiceList.appendChild(item);
    });
  }

  function updateSloganCount(){
    selfSloganCount.textContent = String(selfSloganInput.value.length);
  }
  selfSloganInput.addEventListener('input', updateSloganCount);

  function openSelfEditor(){
    pendingVoice = { ...SELF.voice };
    /* 保证 pendingVoice 在 VOICE_PRESETS 里（若当前 SELF 的 voice 不在，默认选第一个） */
    if (!VOICE_PRESETS.find(v => v.voiceName === pendingVoice.voiceName)) {
      pendingVoice = { ...VOICE_PRESETS[0] };
    }
    selfSloganInput.value = SELF.slogan || '';
    updateSloganCount();
    renderSloganChips();
    renderVoiceList();
    selfEditor.classList.add('show');
  }
  function closeSelfEditor(){
    selfEditor.classList.remove('show');
    /* 停止试听 */
    try {
      ttsQueue.length = 0;
      sharedAudio.pause();
      sharedAudio.currentTime = 0;
      ttsPlaying = false;
    } catch(e){}
  }
  selfEditorBack.addEventListener('click', closeSelfEditor);

  selfEditorSave.addEventListener('click', () => {
    const newSlogan = (selfSloganInput.value || '').trim();
    if (newSlogan) SELF.slogan = newSlogan;
    if (pendingVoice) {
      SELF.voice = {
        voiceName: pendingVoice.voiceName,
        rate: pendingVoice.rate || '-5%',
        pitch: pendingVoice.pitch || '-2Hz',
      };
    }
    /* 回写到主半屏的 OS 气泡 */
    if (currentSheetMember === SELF) {
      osText.textContent = SELF.slogan;
      osBubble.dataset.osContent = SELF.slogan;
    }
    closeSelfEditor();
  });

  /* 点击我的形象图 → 打开编辑页（仅 SELF）*/
  document.getElementById('avatarSheetFigure').addEventListener('click', () => {
    if (currentSheetMember === SELF) openSelfEditor();
  });

  /* 点击形象弹出半屏 —— 事件委托在 msgList 上 */
  msgList.addEventListener('click', (e) => {
    const avatarEl = e.target.closest('.avatar-character');
    if (!avatarEl) return;
    /* 找到对应的 member */
    const row = avatarEl.closest('.msg-row');
    if (!row) return;
    const senderEl = row.querySelector('.sender-name');
    if (!senderEl) return;
    const name = senderEl.textContent.trim();
    /* 查找 member */
    let member = null;
    if (name === SELF.name) { member = SELF; }
    else { member = MEMBERS.find(m => m.name === name); }
    if (member) openAvatarSheet(member);
  });

})();
</script>

<!-- 调参面板交互 -->
<script>
(function(){
  const panel = document.getElementById('tunerPanel');
  const toggle = document.getElementById('tunerToggle');
  const resetBtn = document.getElementById('tunerReset');
  if (!panel || !toggle) return;

  toggle.addEventListener('click', () => { panel.classList.toggle('open'); });

  /* 保存默认值 */
  const defaults = {};
  panel.querySelectorAll('input[type="range"]').forEach(input => {
    defaults[input.dataset.css || input.dataset.js] = input.value;
  });

  /* 滑动实时更新 */
  panel.addEventListener('input', (e) => {
    const input = e.target;
    if (input.type !== 'range') return;
    const val = parseFloat(input.value);
    const valSpan = input.nextElementSibling;

    if (input.dataset.css) {
      const unit = input.dataset.unit || '';
      document.documentElement.style.setProperty(input.dataset.css, val + unit);
      if (valSpan) valSpan.textContent = val + unit;
    }
    if (input.dataset.js) {
      if (window._tunerVars) window._tunerVars[input.dataset.js] = val;
      if (valSpan) valSpan.textContent = val;
    }
  });

  /* 重置 */
  resetBtn.addEventListener('click', () => {
    panel.querySelectorAll('input[type="range"]').forEach(input => {
      const key = input.dataset.css || input.dataset.js;
      const def = defaults[key];
      if (def == null) return;
      input.value = def;
      const val = parseFloat(def);
      const valSpan = input.nextElementSibling;
      if (input.dataset.css) {
        const unit = input.dataset.unit || '';
        document.documentElement.style.setProperty(input.dataset.css, val + unit);
        if (valSpan) valSpan.textContent = val + unit;
      }
      if (input.dataset.js) {
        if (window._tunerVars) window._tunerVars[input.dataset.js] = val;
        if (valSpan) valSpan.textContent = val;
      }
    });
  });
})();

/* 气泡 A/B/C 切换：手机长按显示，电脑点击显示 */
(function(){
  const popup = document.getElementById('bubbleStylePopup');
  const toggle = document.getElementById('bubbleStyleToggle');
  const msgList = document.getElementById('msgList');
  if (!popup || !toggle || !msgList) return;

  const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
  let longPressTimer = null;

  if (isMobile) {
    /* 手机端：长按显示 */
    msgList.addEventListener('touchstart', (e) => {
      longPressTimer = setTimeout(() => { popup.classList.add('show'); }, 500);
    }, { passive: true });
    msgList.addEventListener('touchend', () => { clearTimeout(longPressTimer); });
    msgList.addEventListener('touchcancel', () => { clearTimeout(longPressTimer); });
    msgList.addEventListener('touchmove', () => { clearTimeout(longPressTimer); });
  } else {
    /* 电脑端：点击消息区域显示/隐藏 */
    msgList.addEventListener('click', (e) => {
      if (popup.contains(e.target)) return;
      e.stopPropagation();
      popup.classList.toggle('show');
    });
  }

  /* 点击切换按钮 */
  toggle.addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-bubble]');
    if (!btn) return;
    e.stopPropagation();
    document.body.setAttribute('data-bubble', btn.dataset.bubble);
    toggle.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    /* 切换后自动隐藏 */
    setTimeout(() => popup.classList.remove('show'), 300);
  });

  /* Demo 模式切换 */
  const demoToggle = document.getElementById('demoModeToggle');
  if (demoToggle) {
    demoToggle.addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-demo]');
      if (!btn) return;
      e.stopPropagation();
      document.body.setAttribute('data-demo', btn.dataset.demo);
      demoToggle.querySelectorAll('button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      /* 切回基础模式时清理游戏化元素 */
      if (btn.dataset.demo === 'basic') {
        document.querySelectorAll('.resonance-fx, .faction-scoreboard, .falling-item, .resonance-link-layer').forEach(el => el.remove());
        document.querySelectorAll('.msg-row').forEach(r => {
          r.classList.remove('angry-push','angry-squeezed','angry-king','angry-loser','faction-a','faction-b');
        });
        if (window.GameMode) GameMode.activeFaction = null;
      }
      setTimeout(() => popup.classList.remove('show'), 300);
    });
  }

  /* 动画强度切换（1-4 档）*/
  document.body.setAttribute('data-intensity', '1');
  const intensityToggle = document.getElementById('intensityToggle');
  if (intensityToggle) {
    intensityToggle.addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-intensity]');
      if (!btn) return;
      e.stopPropagation();
      document.body.setAttribute('data-intensity', btn.dataset.intensity);
      intensityToggle.querySelectorAll('button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      setTimeout(() => popup.classList.remove('show'), 300);
    });
  }

  /* 点击其他地方消失 */
  document.addEventListener('click', (e) => {
    if (!popup.contains(e.target)) {
      popup.classList.remove('show');
    }
  });
  document.addEventListener('touchstart', (e) => {
    if (!popup.contains(e.target)) {
      popup.classList.remove('show');
    }
  }, { passive: true });
})();
</script>
